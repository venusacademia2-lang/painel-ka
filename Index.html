<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Gestão — Knowledge Angola</title>
<style>
:root{color-scheme:light;--azul:#1F3864;--azul2:#2E5496;--dour:#BF9000;--bg:#f5f5f7;--cinza:#EEF1F6;--linha:#E2E6EE;--verde:#1E7B45;--verm:#C0392B;--txt:#1a2233;--sombra:0 1px 2px rgba(0,0,0,.04),0 6px 22px rgba(0,0,0,.05)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;border-radius:9px;padding:9px 15px;font-weight:600;font-size:14px}
.btn-p{background:var(--azul);color:#fff}.btn-p:hover{background:var(--azul2)}
.btn-g{background:var(--dour);color:#fff}
.btn-o{background:#fff;color:var(--azul);border:1px solid var(--linha)}.btn-o:hover{border-color:var(--azul2)}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--linha);border-radius:9px;width:100%;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--azul2)}
label{display:block;font-weight:600;font-size:12px;margin:0 0 4px;color:#55607a}
.muted{color:#7b869c;font-size:12.5px}
/* login */
#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.card{background:#fff;border:1px solid var(--linha);border-radius:16px;box-shadow:var(--sombra)}
.loginbox{width:100%;max-width:430px;padding:34px}
.wordmark-lg{height:52px;display:block;margin:0 auto}
.entrymode{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.entrymode button{width:100%;padding:15px;text-align:left;display:flex;flex-direction:column;gap:2px}
.entrymode .sub{font-weight:400;font-size:12px;opacity:.85}
.note{background:#fbf1d9;border:1px solid #ead98c;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#6b5200;margin-top:14px}
/* shell */
#app{display:flex;min-height:100vh}
#sidebar{width:236px;background:#fff;border-right:1px solid var(--linha);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-logo{padding:20px 18px 14px;border-bottom:1px solid var(--linha)}
.side-logo img{height:36px;display:block}
#nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.navbtn{background:none;color:#55607a;text-align:left;border-radius:10px;padding:11px 12px;display:flex;align-items:center;gap:11px;border-left:3px solid transparent;font-weight:600}
.navbtn:hover{background:var(--cinza)}
.navbtn.active{background:#eaf0fb;color:var(--azul);border-left-color:var(--dour)}
.navbtn .ic{width:18px;height:18px;flex:0 0 18px;color:inherit}
.side-foot{padding:14px;border-top:1px solid var(--linha);display:flex;flex-direction:column;gap:9px}
.rolechip{background:var(--azul);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;text-align:center}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--linha);padding:16px 26px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:10px}
.mob-sair{display:none}
.topbar h1{font-size:19px;color:var(--azul)}
.topbar .sub{margin-top:2px}
main{padding:24px 26px;max-width:1320px;width:100%}
/* kpis + cards */
.kpigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.kpi{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:16px;box-shadow:var(--sombra);cursor:pointer;transition:border-color .15s,transform .15s}
.kpi:hover{border-color:var(--azul2);transform:translateY(-1px)}
.kpi .lab{font-size:12px;color:#7b869c;font-weight:600}
.kpi .val{font-size:24px;font-weight:800;color:var(--azul);margin-top:6px}
.kpi.alert .val{color:var(--verm)}.kpi.money .val{color:var(--verde)}
.sec{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:18px;margin-top:18px;box-shadow:var(--sombra);overflow-x:auto}
.sec h2{font-size:16px;color:var(--azul);margin-bottom:2px}
.sec .muted{margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--linha)}
th{color:#7b869c;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
tr:hover td{background:#fafbfe}
.pill{padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700;display:inline-block}
.p-verde{background:#e5f4ec;color:var(--verde)}.p-verm{background:#fbe7e6;color:var(--verm)}
.p-azul{background:#e7edf7;color:var(--azul2)}.p-dour{background:#fbf1d9;color:#8a6a00}.p-cinza{background:#eef0f4;color:#66708a}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.search{max-width:360px;margin-bottom:12px}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spacer{flex:1}
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.col{background:var(--bg);border-radius:12px;padding:12px;min-height:120px;overflow:hidden}
.tablewrap{overflow-x:auto}
.col h3{font-size:13px;margin-bottom:10px;display:flex;justify-content:space-between}
.leadcard{background:#fff;border:1px solid var(--linha);border-radius:10px;padding:10px;margin-bottom:9px;font-size:12.5px}
.leadcard b{display:block}.leadcard .mv{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}.leadcard .mv button{padding:3px 8px;font-size:11px}
.chartwrap{height:220px;position:relative}
/* tarefas */
.todo{display:flex;align-items:flex-start;gap:11px;padding:11px 6px;border-bottom:1px solid var(--linha)}
.todo:last-child{border-bottom:none}
.todo input[type=checkbox]{width:20px;height:20px;margin-top:1px;cursor:pointer;accent-color:var(--azul)}
.todo .t{flex:1;line-height:1.4}
.todo.done .t{text-decoration:line-through;color:#9aa3b5}
.todo .x{background:none;color:#b7bfce;padding:2px 8px}.todo .x:hover{color:var(--verm)}
.addbar{display:flex;gap:9px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--azul);color:#fff;padding:11px 20px;border-radius:10px;font-weight:600;opacity:0;transition:.3s;z-index:50}
.toast.show{opacity:1}
#navmask{display:none;position:fixed;inset:0;background:rgba(20,30,60,.4);z-index:55}
.mob-menu{display:none;background:none;color:var(--azul);font-size:22px;padding:2px 10px;cursor:pointer;line-height:1;border-radius:8px}
.mob-menu:hover{background:var(--cinza)}
.top-k{display:none;flex:0 0 auto}
.mobrole{display:none}
@media(max-width:820px){
 #sidebar{position:fixed;top:0;left:0;height:100vh;width:250px;z-index:60;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 6px 30px rgba(20,30,60,.25)}
 #app.navopen #sidebar{transform:translateX(0)}
 #app.navopen #navmask{display:block}
 .mob-menu{display:inline-flex;align-items:center}
 .top-k{display:block}
 .mob-sair{display:inline-block}
 .side-foot{display:none}
 .sec{overflow-x:auto}
 .sec table{min-width:100%;width:max-content}
 main{padding:14px}
 .topbar{padding:12px 14px}
 .topbar h1{font-size:17px}
 .sec table td:first-child,.sec table th:first-child{position:sticky;left:0;background:#fff;z-index:1;box-shadow:1px 0 0 var(--linha)}
 html[data-theme="dark"] .sec table td:first-child,html[data-theme="dark"] .sec table th:first-child{background:#1a2130}
}
@media(max-width:560px){
 body{font-size:13.5px}
 main{padding:10px}
 .sec{padding:13px;margin-top:12px;border-radius:11px}
 .formgrid{grid-template-columns:1fr}
 .kpigrid{grid-template-columns:1fr}
 .kanban{grid-template-columns:1fr}
 .search{max-width:100%}
 .topbar{padding:10px 12px}
 .topbar h1{font-size:16px}
 .sec h2{font-size:16px}
 .row-actions{flex-wrap:wrap}
 .formgrid input,.formgrid select,.formgrid textarea{font-size:16px}
 .navbtn{font-size:15.5px;padding:12px 12px}
 .navtop{font-size:15.5px}
 .navgrp>summary{font-size:13px;padding:12px 14px;letter-spacing:.03em}
 #sidebar{width:270px}
 .topbar{flex-wrap:wrap;row-gap:6px}
 #ocultBtn span{display:none}
 .topbar h1{flex:1 0 55%}
}
@page{size:A4;margin:0}
@media print{html,body{background:#fff!important}body *{visibility:hidden}#compdoc,#compdoc *,#recdoc,#recdoc *{visibility:visible}#compdoc,#recdoc{position:absolute!important;left:0;top:0;width:100%;background:#fff!important;border:none!important;border-radius:0!important;margin:0!important;padding:16mm 18mm!important;font-size:13.5px!important;line-height:1.6!important;box-shadow:none!important}#compdoc h2{margin:16px 0 6px!important}#compdoc p{margin:9px 0!important}#compdoc .det{margin-top:18px!important;padding-top:14px!important}}
details.sec>summary{cursor:pointer;font-weight:700;color:var(--azul);font-size:16px;list-style:none;padding:2px 0;outline:none}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary::before{content:"▸ ";color:var(--dour)}
details.sec[open]>summary::before{content:"▾ "}
details.subdet{margin-top:6px}
details.subdet>summary{cursor:pointer;font-weight:600;color:var(--azul2);font-size:13px;list-style:none;outline:none}
details.subdet>summary::-webkit-details-marker{display:none}
details.subdet>summary::before{content:"+ ";color:var(--dour);font-weight:800}
details.subdet[open]>summary::before{content:"– "}
.navtop{font-weight:600;border-bottom:1px solid var(--linha)}
.sec,.kpi{border-radius:16px}
.btn-p,.btn-g,.btn-o{border-radius:10px;transition:transform .12s,filter .12s,background .15s}
.btn-p:hover,.btn-g:hover{filter:brightness(1.05);transform:translateY(-1px)}
.kpi{transition:transform .15s,box-shadow .15s}
input,select,textarea{border-radius:10px}
html[data-theme="dark"]{--bg:#0f1420;--cinza:#1a2130;--linha:#2a3345;--txt:#e6ebf3;--sombra:none}
html[data-theme="dark"] .sec,html[data-theme="dark"] .kpi,html[data-theme="dark"] .leadcard{box-shadow:none}
html[data-theme="dark"] .card{background:#1e2838;border:1px solid #37455f;box-shadow:none}
html[data-theme="dark"] tr:hover td{background:#232d3f}
html[data-theme="dark"] body{background:#0f1420;color:#e6ebf3}
html[data-theme="dark"] .sec,html[data-theme="dark"] .kpi,html[data-theme="dark"] .topbar,html[data-theme="dark"] #sidebar,html[data-theme="dark"] .leadcard,html[data-theme="dark"] .card,html[data-theme="dark"] .formcard,html[data-theme="dark"] details.sec{background:#1a2130;border-color:#2a3345;color:#e6ebf3}
html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea{background:#0f1420;color:#e6ebf3;border-color:#2a3345}
html[data-theme="dark"] .navbtn{color:#aab6cf}html[data-theme="dark"] table th{color:#9aa6bd}html[data-theme="dark"] .muted{color:#8b97ab}
html[data-theme="dark"] h1,html[data-theme="dark"] h2,html[data-theme="dark"] h3{color:#e6ebf3}
html[data-theme="dark"] .val{color:#eaf0fb}
html[data-theme="dark"] .lab{color:#9aa6bd}
html[data-theme="dark"] .btn-o{background:#1a2130;color:#dbe3f0;border-color:#33405a}
html[data-theme="dark"] label{color:#aab6cf}
html[data-theme="dark"] details.sec>summary{color:#cdd8ec}
html[data-theme="dark"] details.subdet>summary{color:#aab6cf}
html[data-theme="dark"] .p-cinza{background:#2a3345;color:#c9d2e3}
html[data-theme="dark"] a{color:#8fb3f0}
html[data-theme="dark"] b,html[data-theme="dark"] strong{color:#f2f5fa}
html[data-theme="dark"] .navgrp>summary{color:#8b97ab}
html[data-theme="dark"] .topbar h1,html[data-theme="dark"] .rolechip{color:#e6ebf3}
.tema-toggle{border:none;background:none;cursor:pointer;padding:0;margin-right:10px}
.tema-track{display:inline-flex;align-items:center;width:52px;height:28px;border-radius:20px;background:var(--cinza);border:1px solid var(--linha);position:relative;transition:background .2s;vertical-align:middle}
.tema-thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s;display:grid;place-items:center}
.tema-thumb::after{content:"\2600";font-size:13px;color:#f5a623;line-height:1}
html[data-theme="dark"] .tema-track{background:#2a3345}
html[data-theme="dark"] .tema-thumb{left:28px;background:#0f1420}
html[data-theme="dark"] .tema-thumb::after{content:"\263E";color:#c9d2e3}
.navgrp{border-bottom:1px solid var(--linha)}
.navgrp>summary{cursor:pointer;list-style:none;padding:10px 14px;font-weight:700;color:#55607a;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.navgrp>summary::-webkit-details-marker{display:none}
.navgrp>summary::before{content:"\25B8";color:var(--azul2);margin-right:6px;font-size:10px}
.navgrp[open]>summary::before{content:"\25BE"}
.navgrp .navbtn{padding-left:26px}
@media (max-width:720px){
 .formgrid{grid-template-columns:1fr!important}
 .kpigrid{grid-template-columns:1fr 1fr!important}
 .kanban{grid-template-columns:1fr!important}
 table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
 .btn-p,.btn-g,.btn-o{min-height:40px;padding-top:8px;padding-bottom:8px}
 .pill{min-height:26px;display:inline-flex;align-items:center}
 input,select,textarea{font-size:16px}
 .card{max-height:90vh;overflow:auto}
 .topbar h1{font-size:18px}
 .row-actions{flex-wrap:wrap;gap:8px}
}
</style>
</head>

function exportCSV(tipo){const rows=data[tipo];if(!rows.length){toast("Nada para exportar");return}const keys=Object.keys(rows[0]);

 data[tipo]=out;persist();toast("Importado "+out.length+" registos");show(tipo);}
function parseLine(l){const r=[];let c="",q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){r.push(c);c=""}else c+=ch}r.push(c);return r}

   <div><label>Cargo</label><input id="cf_cargo" value="${esc(data.comp.cargo)}"></div>
   <div><label>Telefone</label><input id="cf_tel" value="${esc(data.comp.tel)}"></div>
   <div><label>E-mail principal da academia</label><input id="cf_email" value="${esc(data.comp.email)}"></div>
   <div><label>Morada</label><input id="cf_morada" value="${esc(data.comp.morada)}"></div>
   <div><label>Nº INEFOP</label><input id="cf_inefop" value="${esc(data.comp.inefop)}"></div>
   <div><label>Link GPS</label><input id="cf_gps" value="${esc(data.comp.gps)}"></div>
   <div><label>Local por defeito</label><input id="cf_local" value="${esc(data.comp.local)}"></div>
   <div><label>Banco (aparece na landing)</label><input id="cf_banco" value="${esc(data.comp.banco||'')}" placeholder="ex.: BAI"></div>
   <div><label>Nº de conta / IBAN</label><input id="cf_iban" value="${esc(data.comp.iban||'')}" placeholder="AO06 ..."></div>
   <div><label>Titular da conta</label><input id="cf_titular" value="${esc(data.comp.titular||'')}"></div>
   <div><label>Referência / Express (opcional)</label><input id="cf_ref" value="${esc(data.comp.ref||'')}"></div>
   <div><label>Link da landing (para partilhar)</label><input id="cf_landurl" value="${esc(data.comp.landingUrl||'')}"></div>
  </div>
  <div style="margin-top:10px"><label>Texto de introdução</label><textarea id="cf_intro" rows="2">${esc(data.comp.intro)}</textarea></div>
  <div style="margin-top:8px"><label>Texto de fecho</label><input id="cf_fecho" value="${esc(data.comp.fecho)}"></div>
  <div style="margin-top:8px"><label>Mensagem de parabéns (conclusão) — usa {nome}</label><textarea id="cf_parabens" rows="4">${esc(data.comp.parabens||"")}</textarea></div>
  <div class="formgrid" style="margin-top:10px">
   <div><label>Logótipo (canto sup. esquerdo)</label><input id="cf_logo" type="file" accept="image/*" onchange="uploadCompImg('logo',this)"></div>
   <div><label>Nova imagem do QR code</label><input id="cf_qr" type="file" accept="image/*" onchange="uploadCompImg('qr',this)"></div>
   <div><label>Nova imagem do carimbo/assinatura</label><input id="cf_carimbo" type="file" accept="image/*" onchange="uploadCompImg('carimbo',this)"></div>
  </div>
  <div class="row-actions"><button class="btn-p" onclick="saveComp()">Guardar configuração</button><button class="btn-o" onclick="if(confirm('Repor comprovativo por defeito?')){data.comp=compDefaults();persist();render()}">Repor por defeito</button></div></div>
 <div class="sec"><h2>Perfis de equipa (login por pessoa)</h2><div class="muted">Cada pessoa entra pelo seu perfil com password. Cadeado leve — protege a vista, não é segurança a sério.</div>
  <div class="formgrid">
   <div><label>Nome</label><input id="pf_nome"></div>
   <div><label>ID (código de entrada)</label><input id="pf_id" placeholder="ex.: milena"></div>
   <div><label>Função</label><select id="pf_funcao"><option>Assistente</option><option>Formador</option><option>Gestora de Formação</option><option>Gestor</option></select></div>
   <div><label>Departamento</label><select id="pf_dep" onchange="depChg()">${Object.keys(DEPARTAMENTOS).map(function(dp){return '<option>'+esc(dp)+'</option>';}).join("")}</select></div>
   <div><label>Área</label><select id="pf_area">${areaOpts(Object.keys(DEPARTAMENTOS)[0],"")}</select></div>
   <div><label>E-mail</label><input id="pf_email"></div>
   <div><label>PIN</label><input id="pf_pass"></div>
  </div>
  <div class="row-actions"><button class="btn-p" onclick="addPerfil()">Adicionar perfil</button></div>
  <div class="muted" style="margin-top:6px">Cada pessoa entra com o seu <b>ID</b> e <b>PIN</b> (não aparece a lista de nomes no ecrã de entrada).</div>
  <table style="margin-top:12px"><thead><tr><th>Nome</th><th>ID</th><th>Função</th><th>E-mail</th><th>PIN</th><th>Depto / Área</th><th></th></tr></thead><tbody>
  ${data.perfis.map((p,i)=>`<tr><td>${esc(p.nome)}</td><td><b>${esc(p.id||"—")}</b></td><td>${esc(p.funcao)}</td><td>${esc(p.email||"")}</td><td><b>${esc(p.pass||"")}</b> <button class="btn-o" style="padding:2px 8px" onclick="resetPerfilPass(${i})">novo</button></td><td>${esc(p.departamento||"—")}${p.area?'<br><span class="muted">'+esc(p.area)+'</span>':''} <button class="btn-o" style="padding:2px 8px" title="Editar depto/área" onclick="editPerfilDep(${i})">✎</button></td><td class="flex" style="gap:6px"><button class="btn-o" style="padding:4px 8px" onclick="editPerms(${i})">Permissões</button><button class="btn-o" style="padding:4px 10px" onclick="delPerfil(${i})">✕</button></td></tr>`).join("")||`<tr><td colspan="7" class="muted">Sem perfis.</td></tr>`}
  </tbody></table></div>
 <div class="sec"><h2>Mudar senha de gestão</h2>
  <div class="formgrid"><div><label>Nova senha</label><input id="np" type="password"></div></div>
  <div class="row-actions"><button class="btn-p" onclick="changePass()">Guardar senha</button></div>
  <div class="note">A senha fica guardada só neste navegador. Anota-a num sítio seguro.</div></div>
 <div class="sec"><h2>Checklists-padrão por função</h2><div class="muted">Define as tarefas diárias de cada função. Cada colaborador vê a sua checklist nas Notificações; os checks reiniciam a cada dia. Uma tarefa por linha.</div>
  ${Object.keys(ensureChkPadrao()).map(function(func){return '<div style="margin-top:10px"><label>'+esc(func)+'</label><textarea rows="4" onchange="setChkPadrao(&#39;'+esc(func)+'&#39;,this)">'+esc((ensureChkPadrao()[func]||[]).join("\n"))+'</textarea></div>';}).join("")}
  <div class="note">As tarefas pontuais com prazo atribuídas a uma pessoa continuam a usar a aba "Comunicados &amp; Tarefas".</div></div>
 <div class="sec"><h2>Registo de apagados</h2><div class="muted">O que foi apagado, por quem e quando. Podes restaurar.</div>
  <details class="accdet" ${apagOpen?"open":""} ontoggle="apagOpen=this.open"><summary style="cursor:pointer;display:inline-block;padding:8px 14px;background:var(--azul);color:#fff;border-radius:8px;font-weight:600;list-style:none">🗑 Mostrar registo de apagados</summary>
  <table style="margin-top:8px"><thead><tr><th>Quando</th><th>Quem</th><th>Aba</th><th>Registo</th><th></th></tr></thead><tbody>
  ${(data.apagados||[]).map((a,idx)=>`<tr><td>${esc(a.quando||"")}</td><td>${esc(a.quem||"")}</td><td>${esc(a.aba||"")}</td><td>${esc((a.registo&&(a.registo.nome||a.registo.tel||JSON.stringify(a.registo).slice(0,40)))||"")}</td><td><button class="btn-o" style="padding:4px 8px" onclick="restaurarApagado(${idx})">Restaurar</button>${role==="admin"?`<button class="btn-o" style="padding:4px 8px;margin-left:4px" onclick="eliminarApagado(${idx})">Eliminar de vez</button>`:""}</td></tr>`).join("")||`<tr><td colspan="5" class="muted">Nada apagado.</td></tr>`}
  </tbody></table></details></div>
 <div class="sec"><h2>Repor dados de exemplo</h2><div class="muted">Apaga tudo e volta ao estado inicial.</div><div class="row-actions"><button class="btn-o" onclick="resetAll()">Repor de raiz</button></div></div>`;}
function savePrecos(){CURSOS.forEach((c,i)=>{data.precos[c]=+val("preco_"+i)||0});persist();toast("Preços actualizados");render()}
function saveComp(){const c=data.comp;c.director=val("cf_director");c.cargo=val("cf_cargo");c.tel=val("cf_tel");c.email=val("cf_email");c.morada=val("cf_morada");c.inefop=val("cf_inefop");c.gps=val("cf_gps");c.local=val("cf_local");c.banco=val("cf_banco");c.iban=val("cf_iban");c.titular=val("cf_titular");c.ref=val("cf_ref");c.landingUrl=val("cf_landurl");c.intro=val("cf_intro");c.fecho=val("cf_fecho");c.parabens=val("cf_parabens");persist();toast("Configuração actualizada");render()}
function uploadCompImg(key,inp){const file=inp.files&&inp.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{data.comp[key]=e.target.result;persist();toast("Imagem carregada — guarda para aplicar")};r.readAsDataURL(file)}
const DEPARTAMENTOS={"Direcção Geral":["Direcção Geral"],"Tecnologia":["Suporte Corporativo","Suporte IT às Formações"],"Académico":["Formação (Formadores + Acompanhamento)","Livraria e Actualização Formativa"],"Marketing e Vendas":["Vendas","Marketing","Mídia Social (Editor + Captação)"],"Finanças":["Administrativa","Contabilidade e Fiscalidade","Orçamento e Logística"],"Capital Humano":["Processamento","Gestão de Pessoas"],"Auditoria":["Corporativa e às Formações"]};
function areaOpts(dep,sel){return (DEPARTAMENTOS[dep]||[]).map(function(a){return '<option '+(sel===a?"selected":"")+'>'+esc(a)+'</option>';}).join("");}
function depChg(){var a=document.getElementById("pf_area");if(a)a.innerHTML=areaOpts(val("pf_dep"),"");}
function editPerfilDep(i){var p=data.perfis[i];if(!p)return;var deps=Object.keys(DEPARTAMENTOS);var dep=prompt("Departamento ("+deps.join(" / ")+"):",p.departamento||deps[0]);if(dep===null)return;dep=dep.trim();if(!DEPARTAMENTOS[dep]){toast("Departamento inválido");return;}var areas=DEPARTAMENTOS[dep];var area=prompt("Área ("+areas.join(" / ")+"):",p.area||areas[0]);if(area===null)return;p.departamento=dep;p.area=(area||"").trim();persist();toast("Departamento actualizado");render();}
function addPerfil(){const nome=val("pf_nome");if(!nome){toast("Falta o nome");return}const id=val("pf_id")||nome.toLowerCase().split(" ")[0];data.perfis.push({nome,id,funcao:val("pf_funcao"),departamento:val("pf_dep"),area:val("pf_area"),email:val("pf_email"),pass:val("pf_pass")||"1234",podeExportar:true,podeEditar:false});persist();toast("Perfil criado");render()}
let permEdit=null;
function editPerms(i){permEdit=i;render();}
function fecharPerms(){permEdit=null;render();}
function savePerms(){const p=data.perfis[permEdit];if(!p){permEdit=null;render();return;}p.abas=[...document.querySelectorAll('.pm_aba:checked')].map(c=>c.value);const ex=document.getElementById('pm_export');p.podeExportar=ex?ex.checked:true;const ed=document.getElementById('pm_edit');p.podeEditar=ed?ed.checked:false;const pv=document.getElementById('pm_presenca');p.vePresenca=pv?pv.checked:false;const pl=document.getElementById('pm_landing');p.gereLanding=pl?pl.checked:false;persist();permEdit=null;toast("Permissões guardadas");render();}
function permModalHTML(){if(permEdit===null)return"";const p=data.perfis[permEdit];if(!p)return"";const abas=Array.isArray(p.abas)?p.abas:null;const chk=id=>(!abas||abas.indexOf(id)>=0)?"checked":"";
 return `<div style="position:fixed;inset:0;background:rgba(20,30,60,.35);display:grid;place-items:center;z-index:100;padding:16px" onclick="if(event.target===this)fecharPerms()"><div class="card" style="padding:22px;width:470px;max-width:94vw;max-height:88vh;overflow:auto"><div class="flex"><h2 style="color:var(--azul)">Permissões — ${esc(p.nome)}</h2><div class="spacer"></div><button class="btn-o" style="padding:4px 10px" onclick="fecharPerms()">Fechar ✕</button></div>
  <div class="muted" style="margin:2px 0 12px">Escolhe que abas esta pessoa vê. A gestão vê sempre tudo.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${TEAM_ABAS.map(id=>`<label style="font-weight:400;display:flex;gap:6px;align-items:center;margin:0"><input type="checkbox" class="pm_aba" value="${id}" ${chk(id)} style="width:auto"> ${esc(PAGES[id][0])}</label>`).join("")}</div>
  <label style="margin-top:14px;display:flex;gap:8px;align-items:center;font-weight:600"><input type="checkbox" id="pm_export" ${p.podeExportar!==false?"checked":""} style="width:auto"> Pode exportar listas de turmas</label>
  <label style="margin-top:10px;display:flex;gap:8px;align-items:center;font-weight:600"><input type="checkbox" id="pm_edit" ${p.podeEditar===true?"checked":""} style="width:auto"> Pode editar e apagar registos</label>
  <label style="margin-top:10px;display:flex;gap:8px;align-items:center;font-weight:600"><input type="checkbox" id="pm_presenca" ${p.vePresenca===true?"checked":""} style="width:auto"> Pode ver quem está online</label>
  <label style="margin-top:10px;display:flex;gap:8px;align-items:center;font-weight:600"><input type="checkbox" id="pm_landing" ${p.gereLanding===true?"checked":""} style="width:auto"> Pode gerir testemunhos da landing</label>
  <div class="row-actions"><button class="btn-p" onclick="savePerms()">Guardar permissões</button></div></div></div>`;}
function delPerfil(i){if(!confirm("Remover este perfil?"))return;data.perfis.splice(i,1);persist();render()}
function resetPerfilPass(i){const p=data.perfis[i];if(!p)return;const np=prompt("Nova password para "+p.nome+":",p.pass||"");if(np===null)return;p.pass=np;persist();render()}
function changePass(){const p=val("np");if(!p){toast("Escreve a nova senha");return}data.pass=p;persist();toast("Senha actualizada")}
function resetAll(){var c=prompt("Isto apaga TUDO e repõe os exemplos. Escreve o código de segurança para confirmar:");if(c===null)return;if((c||"").trim()!=="199612"){toast("Código de segurança errado — reposição cancelada");return;}data=seed();persist();toast("Dados repostos");render();}
</script>
</body>
</html>
